version: "3.9"

services:
  backend:
    build: ./backend
    container_name: taskflow-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./taskflow.db
      - SECRET_KEY=change-this-in-production-please
    volumes:
      - ./backend:/app
      - taskflow-db:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: taskflow-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  taskflow-db:
